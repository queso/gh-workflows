name: AI PR Review

on:
  workflow_call:
    inputs:
      model:
        description: 'Override model selection (default: auto-selects by PR size — MiniMax M2.5 < 150k tokens, Kimi K2.5 < 220k, Llama 4 Maverick for larger)'
        required: false
        type: string
        default: ''
      fallback_model:
        description: 'Fallback model if primary fails'
        required: false
        type: string
        default: 'fireworks_ai/accounts/fireworks/models/kimi-k2p5'
      context_file:
        description: 'Path to project context file (e.g. CLAUDE.md, AGENTS.md)'
        required: false
        type: string
        default: 'CLAUDE.md'
      extra_instructions:
        description: 'Additional review instructions appended after context file'
        required: false
        type: string
        default: ''
      suggestions_score_threshold:
        description: 'Minimum confidence score (1-10) for suggestions to be posted'
        required: false
        type: number
        default: 7
      num_code_suggestions:
        description: 'Maximum number of code suggestions to post'
        required: false
        type: number
        default: 3
      auto_review:
        description: 'Run /review automatically'
        required: false
        type: boolean
        default: true
      auto_describe:
        description: 'Run /describe automatically'
        required: false
        type: boolean
        default: true
      auto_improve:
        description: 'Run /improve automatically'
        required: false
        type: boolean
        default: true
      commitable_suggestions:
        description: 'Post code suggestions as committable inline comments'
        required: false
        type: boolean
        default: true
    secrets:
      llm_api_key:
        description: 'API key for the LLM provider (e.g. FIREWORKS_AI_API_KEY, ANTHROPIC_KEY)'
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Load project context
        id: context
        run: |
          CONTEXT=""

          # Load primary context file
          if [ -f "${{ inputs.context_file }}" ]; then
            echo "Found ${{ inputs.context_file }}"
            CONTEXT=$(cat "${{ inputs.context_file }}")
          fi

          # Append any AGENTS.md files (up to 3 levels deep)
          for f in $(find . -maxdepth 3 -name "AGENTS.md" 2>/dev/null); do
            echo "Found $f"
            CONTEXT="$CONTEXT"$'\n\n'"--- From $f ---"$'\n'"$(cat "$f")"
          done

          # Append extra instructions
          if [ -n "${{ inputs.extra_instructions }}" ]; then
            CONTEXT="$CONTEXT"$'\n\n'"${{ inputs.extra_instructions }}"
          fi

          if [ -z "$CONTEXT" ]; then
            echo "No context files found, running without project context"
            CONTEXT="No project-specific context provided."
          fi

          # Write to file to avoid env var escaping issues
          echo "$CONTEXT" > /tmp/pr_context.txt
          echo "has_context=true" >> $GITHUB_OUTPUT

      - name: Build extra instructions
        id: instructions
        run: |
          INSTRUCTIONS="Use the following project conventions and context when reviewing this PR:"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n\n'"$(cat /tmp/pr_context.txt)"

          INSTRUCTIONS="$INSTRUCTIONS"$'\n\n'"FLAG THESE (high-value catches where AI review adds real value):"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Null/undefined dereferences, off-by-one errors, and incorrect boundary conditions"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Race conditions, deadlocks, and unsafe concurrent access"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Security issues: injection, auth bypass, secrets in code, path traversal"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Resource leaks: unclosed handles, missing cleanup, unbounded growth"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Logic errors: inverted conditions, wrong operator, swapped arguments"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- API contract violations: wrong types, missing required fields, breaking changes"

          INSTRUCTIONS="$INSTRUCTIONS"$'\n\n'"DO NOT COMMENT ON (these generate noise, not value):"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Code style, formatting, or naming conventions"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Import ordering or organization"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- 'Consider using X instead of Y' style suggestions"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- Missing comments or documentation"
          INSTRUCTIONS="$INSTRUCTIONS"$'\n'"- 'You might want to add tests for this' comments"

          # Use delimiter for multiline env var
          echo "REVIEW_INSTRUCTIONS<<DELIM" >> $GITHUB_ENV
          echo "$INSTRUCTIONS" >> $GITHUB_ENV
          echo "DELIM" >> $GITHUB_ENV

      - name: Select model based on PR diff size
        id: model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Allow callers to override model selection
          if [ -n "${{ inputs.model }}" ]; then
            echo "model=${{ inputs.model }}" >> $GITHUB_OUTPUT
            echo "max_tokens=196608" >> $GITHUB_OUTPUT
            echo "Using caller-specified model: ${{ inputs.model }}"
            exit 0
          fi

          # Estimate token count from the PR diff (~4 chars per token)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          DIFF_SIZE=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            -H "Accept: application/vnd.github.diff" 2>/dev/null | wc -c)
          EST_TOKENS=$((DIFF_SIZE / 4))
          echo "Diff size: ${DIFF_SIZE} bytes, estimated tokens: ${EST_TOKENS}"

          # Route to the best model that can handle this diff size:
          #   < 150k tokens → MiniMax M2.5 (196k limit, best review quality)
          #   < 220k tokens → Kimi K2.5 (262k limit, good quality)
          #   > 220k tokens → Llama 4 Maverick (1M limit, handles anything)
          if [ "$EST_TOKENS" -lt 150000 ]; then
            echo "model=fireworks_ai/accounts/fireworks/models/minimax-m2p5" >> $GITHUB_OUTPUT
            echo "max_tokens=196608" >> $GITHUB_OUTPUT
            echo "Selected: MiniMax M2.5 (small PR)"
          elif [ "$EST_TOKENS" -lt 220000 ]; then
            echo "model=fireworks_ai/accounts/fireworks/models/kimi-k2p5" >> $GITHUB_OUTPUT
            echo "max_tokens=262144" >> $GITHUB_OUTPUT
            echo "Selected: Kimi K2.5 (medium PR)"
          else
            echo "model=fireworks_ai/accounts/fireworks/models/llama4-maverick-instruct-basic" >> $GITHUB_OUTPUT
            echo "max_tokens=1000000" >> $GITHUB_OUTPUT
            echo "Selected: Llama 4 Maverick (large PR)"
          fi

      - name: Run PR Agent
        uses: qodo-ai/pr-agent@v0.32
        env:
          # Set all provider keys — only the one matching the model is used.
          # OPENAI_KEY must be set (even as dummy) or PR-Agent may fail to start.
          OPENAI_KEY: ${{ secrets.llm_api_key }}
          FIREWORKS_AI_API_KEY: ${{ secrets.llm_api_key }}
          ANTHROPIC.KEY: ${{ secrets.llm_api_key }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Note: PR-Agent uses Dynaconf. Dots in env var names can be
          # dropped by Docker; double-underscore (__) is the reliable
          # nested-key separator that Dynaconf documents.
          config__model: ${{ steps.model.outputs.model }}
          config__fallback_models: '["${{ inputs.fallback_model }}"]'
          config__custom_model_max_tokens: ${{ steps.model.outputs.max_tokens }}
          config__max_model_tokens: ${{ steps.model.outputs.max_tokens }}
          config__ai_timeout: 300
          config__temperature: 0.05
          github_action_config__auto_review: ${{ inputs.auto_review }}
          github_action_config__auto_describe: ${{ inputs.auto_describe }}
          github_action_config__auto_improve: ${{ inputs.auto_improve }}
          github_action_config__pr_actions: '["opened", "reopened", "ready_for_review"]'
          pr_reviewer__extra_instructions: ${{ env.REVIEW_INSTRUCTIONS }}
          pr_reviewer__require_tests_review: false
          pr_reviewer__enable_help_text: false
          pr_reviewer__persistent_comment: true
          pr_code_suggestions__extra_instructions: ${{ env.REVIEW_INSTRUCTIONS }}
          pr_code_suggestions__commitable_code_suggestions: ${{ inputs.commitable_suggestions }}
          pr_code_suggestions__suggestions_score_threshold: ${{ inputs.suggestions_score_threshold }}
          pr_code_suggestions__num_code_suggestions: ${{ inputs.num_code_suggestions }}
          pr_code_suggestions__focus_only_on_problems: true
          pr_code_suggestions__persistent_comment: true
          pr_code_suggestions__enable_help_text: false
          pr_description__enable_large_pr_handling: true
